<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive 3D knowledge globe. Every cluster of thought, tethered to a single core." />
    <meta name="theme-color" content="#060310" />
    <title>Mnemosphere · 2026</title>
    <!-- Critical background: paint dark on the very first frame so there is no
         white flash before the JS-imported stylesheet loads. Covers html, body
         and the canvas (blank before its first WebGL frame). -->
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #060310; }
      canvas { display: block; background: #060310; }
    </style>
  </head>
  <body>
    <div class="vignette"></div>
    <div id="ui">
      <div class="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; click or drag a hub</div>
      <div id="tooltip"></div>
    </div>

    <aside id="sidebar" aria-label="Pages"></aside>

    <section id="page" aria-hidden="true">
      <header class="pg-top">
        <div class="pg-crumbs">
          <button class="pg-cluster" id="pg-cluster"></button>
          <span class="pg-sep">/</span>
          <span class="pg-ptitle" id="pg-ptitle"></span>
          <span class="pg-private">Private</span>
        </div>
        <div class="pg-tools">
          <span class="pg-edited" id="pg-edited"></span>
          <button class="pg-share">Share</button>
          <button class="pg-tool" id="pg-more" aria-label="More actions">•••</button>
          <button class="pg-tool pg-close" id="pg-close" aria-label="Back to globe">Back to globe</button>
        </div>
      </header>
      <div class="pg-scroll">
        <div class="pg-cover" id="pg-cover">
          <div class="pg-cover-tools">
            <button class="pg-cover-btn" id="pg-cover-change">Change cover</button>
            <button class="pg-cover-btn" id="pg-cover-remove">Remove</button>
          </div>
        </div>
        <article class="pg-doc" id="pg-doc">
          <button class="pg-icon" id="pg-icon" aria-label="Change page icon"></button>
          <div class="pg-addbar" id="pg-addbar"></div>
          <h1 class="pg-title" id="pg-title" contenteditable="true" spellcheck="false" data-ph="Untitled"></h1>
          <button class="pg-connected" id="pg-connected"></button>
          <div class="pg-content" id="pg-content" contenteditable="true" spellcheck="false" data-ph="Write something, or link this note to the globe…"></div>
          <div class="pg-getstarted">
            <div class="pg-gs-label">Get started with</div>
            <div class="pg-gs-row" id="pg-gs"></div>
          </div>
        </article>
      </div>
      <div class="pg-menu" id="pg-menu"></div>
    </section>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
