<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive 3D knowledge globe. Every cluster of thought, tethered to a single core." />
    <title>Mnemosphere · 2026</title>
    <!-- Critical background: paint dark on the very first frame so there is no
         white flash before the JS-imported stylesheet loads. -->
    <style>
      html, body { margin: 0; height: 100%; background: #060310; }
      :root { color-scheme: dark; }
    </style>
  </head>
  <body>
    <div class="vignette"></div>
    <div id="ui">
      <div class="brand">
        <h1>Mnemosphere</h1>
        <p>Interactive knowledge globe</p>
      </div>
      <div class="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; click or drag a hub</div>
      <div id="tooltip"></div>
    </div>

    <aside id="tree" aria-label="Pages"></aside>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
