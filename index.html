<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive 3D knowledge globe. Every cluster of thought, tethered to a single core." />
    <title>Second Brain Globe</title>
  </head>
  <body>
    <div id="app"></div>
    <div class="vignette" aria-hidden="true"></div>

    <header class="brand">
      <div class="brand-title">Second Brain</div>
      <div class="brand-sub">Interactive knowledge globe</div>
    </header>

    <div class="hint">drag to rotate · scroll to zoom · click a hub</div>

    <aside id="focus-panel" aria-live="polite">
      <h2 class="panel-title"></h2>
      <div class="panel-count"></div>
      <div class="panel-orbit"></div>
      <div class="panel-bar"></div>
      <div class="panel-release">click empty space to release</div>
