<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mnemosphere</title>
    <!-- Critical background: paint dark on the very first frame so there is no
         white flash before the JS-imported stylesheets load. Covers html, body
         and the canvas (blank before its first WebGL frame). -->
    <style>
      html, body { margin: 0; height: 100%; background: #060310; }
      canvas { display: block; background: #060310; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
