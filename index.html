<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An interactive 3D knowledge globe. Every cluster of thought, tethered to a single core." />
    <meta name="theme-color" content="#060310" />
    <title>Mnemosphere · 2026</title>
    <!-- Critical background: paint dark on the very first frame so there is no
         white flash before the JS-imported stylesheet loads. Covers html, body
         and the canvas (blank before its first WebGL frame). -->
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #060310; }
      canvas { display: block; background: #060310; }
    </style>
  </head>
  <body>
    <div class="vignette"></div>
    <div id="ui">
      <div class="hint">drag to rotate &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; click or drag a hub</div>
      <div id="tooltip"></div>
    </div>

    <aside id="sidebar" aria-label="Pages"></aside>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
