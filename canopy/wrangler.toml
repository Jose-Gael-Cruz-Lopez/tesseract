name = "canopy"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]

# Custom domain: serve the whole app at memo-sphere.com. Cloudflare provisions the
# DNS record + SSL cert automatically (the zone is in this account). The Worker also
# stays reachable at its workers.dev URL.
routes = [
  { pattern = "memo-sphere.com", custom_domain = true }
]
# Keep the workers.dev URL alive alongside the custom domain (fallback during the
# custom-domain SSL provisioning, and for testing).
workers_dev = true

# Static Assets: served before the Worker fetch handler. Matched files (e.g. "/")
# are returned directly; unmatched paths (/ingest, /feed, /mcp) fall through to src/index.ts.
[assets]
directory = "./web/dist"
binding = "ASSETS"

# D1. For local dev and tests the id is a placeholder (Miniflare uses a local sqlite).
# Run `npm run db:create` to provision the real database and paste its id here before deploy.
[[d1_databases]]
binding = "DB"
database_name = "canopy"
database_id = "53c1314d-2cb3-46b6-9d99-293a855524a4"

[vars]
# "owner/repo" the roadmap/progress read from. Set to your repo.
GITHUB_REPO = "Jose-Gael-Cruz-Lopez/tesseract"
# GitHub org whose ACTIVE members may log in. Leave empty for a personal repo —
# then ADMIN_LOGINS gates login instead of org membership.
AUTH_ORG = ""
# Comma-separated GitHub logins allowed in (login gate when AUTH_ORG is empty)
# and for admin actions. Set to your GitHub login to start.
ADMIN_LOGINS = "Jose-Gael-Cruz-Lopez"

[observability]
enabled = true

# Capture-time PR/issue summaries come from Google Gemini over REST (GEMINI_API_KEY
# secret) — a plain fetch(), not a Cloudflare binding, so no [ai] block is needed.

# Scheduled backstop for the milestone progress cache (event-derived writes are primary).
[triggers]
crons = ["0 */6 * * *"]
